<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spore Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
  <h1>SPORE</h1>
  <div class="search-wrap">
    <span class="icon">/</span>
    <input type="text" id="search-input" placeholder="Search CID, description, node...">
    <div class="search-result" id="search-result"></div>
  </div>
  <div class="meta">
    <div>node <span id="hdr-node">...</span></div>
    <div><span class="ws-dot" id="ws-dot"></span>live</div>
  </div>
</div>

<div class="filter-bar">
  <div class="stats">
    <div>experiments <span class="val" id="stat-total">0</span></div>
    <div>frontier <span class="val" id="stat-frontier">0</span></div>
    <div>best <span class="val" id="stat-best">—</span></div>
    <div>peer <span class="val" id="stat-peer">0</span></div>
  </div>
  <button class="filter-btn active" data-filter="all">all</button>
  <button class="filter-btn" data-filter="keep">keep</button>
  <button class="filter-btn" data-filter="discard">discard</button>
  <button class="filter-btn" data-filter="crash">crash</button>
</div>

<div class="main">
  <div class="dag-panel" id="dag-panel">
    <div class="empty-state" id="dag-empty">
      <h2>NO EXPERIMENTS YET</h2>
      <div>Run experiments or connect to peers</div>
    </div>
  </div>
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <h2>Experiment</h2>
    </div>
    <div class="detail-body">
      <div class="detail-empty" id="detail-empty">Click a node or press <b>/</b> to search</div>
      <div id="detail-content" style="display:none"></div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="active" data-tab="frontier-tab">Frontier</button>
  <button data-tab="activity-tab">Activity</button>
  <button data-tab="leaderboard-tab">Leaderboard</button>
</div>

<div id="frontier-tab" class="tab-content active">
  <table id="frontier-table">
    <thead><tr>
      <th>CID</th><th>val_bpb</th><th>depth</th><th>GPU</th>
      <th>steps</th><th>params</th><th>description</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</div>

<div id="activity-tab" class="tab-content">
  <div id="activity-feed"></div>
</div>

<div id="leaderboard-tab" class="tab-content">
  <table id="leaderboard-table">
    <thead><tr>
      <th>#</th><th>Node</th><th>Score</th>
      <th>Published</th><th>Verified</th><th>Disputes Won</th><th>Disputes Lost</th>
    </tr></thead>
    <tbody></tbody>
  </table>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
